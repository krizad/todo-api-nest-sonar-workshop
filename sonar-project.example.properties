# Project Identification
sonar.host.url=http://localhost:9000
sonar.token=
sonar.projectKey=todo-api
sonar.projectName=Todo API
sonar.projectVersion=1.0

# Source Locations
sonar.sources=src

# Test
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts

# Coverage Reports (Path to the LCOV file generated by Jest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# File Encoding & Language
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/node_modules/**, **/dist/**, **/test/**, **/*.module.ts, main.ts
sonar.coverage.exclusions=**/*.module.ts, main.ts, **/*.spec.ts